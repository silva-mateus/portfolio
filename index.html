<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Mateus Morais Silva - Business System Analyst Lead especializado em Sistemas de Billing, Análise de Dados e Resolução de Problemas de Alto Impacto. 6+ anos de experiência em ambientes de produção.">
    <meta name="keywords" content="business system analyst lead, billing systems, data analysis, problem solving, python, aws, csg international">
    <meta name="author" content="Mateus Morais Silva">
    <meta property="og:title" content="Mateus Morais Silva | Business System Analyst Lead">
    <meta property="og:description" content="Business System Analyst Lead com 6+ anos de experiência em sistemas de Billing, Análise de Dados e Resolução de Problemas de Alto Impacto">
    <meta property="og:type" content="website">
    <title>Mateus Morais Silva | Business System Analyst Lead</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💼</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Terminal-style fonts: JetBrains Mono for code, Inter for body -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Header / Navigation -->
    <header class="header">
        <nav class="nav">
            <div class="nav-logo">
                <span class="logo-text">Mateus Silva</span>
            </div>
            <ul class="nav-menu" id="navMenu">
                <!-- Navigation generated dynamically -->
            </ul>
            <div class="nav-controls">
                <button class="terminal-toggle" id="terminalToggle" aria-label="Toggle terminal" title="Terminal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="4 17 10 11 4 5"/>
                        <line x1="12" y1="19" x2="20" y2="19"/>
                    </svg>
                    <span class="terminal-tooltip" id="terminalTooltip">
                        <span>Terminal</span>
                        <kbd id="terminalShortcut">Ctrl+Shift+K</kbd>
                    </span>
                </button>
                <button class="lang-toggle" id="langToggle" aria-label="Toggle language" title="Toggle language">
                    <span class="flag-icon" id="flagIcon"></span>
                    <span class="lang-text" id="langText"></span>
                </button>
                <button class="mobile-menu-toggle" id="mobileMenuToggle" aria-label="Toggle menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </div>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="hero" class="hero">
        <div class="container">
            <div class="hero-content animate-on-scroll" id="heroContent"></div>
        </div>
    </section>

    <!-- About Section -->
    <section id="sobre" class="section about">
        <div class="container" id="aboutContainer"></div>
    </section>

    <!-- Skills Section -->
    <section id="skills" class="section skills">
        <div class="container" id="skillsContainer"></div>
    </section>

    <!-- Experience Section -->
    <section id="experiencia" class="section experience">
        <div class="container" id="experienceContainer"></div>
    </section>

    <!-- Projects Section -->
    <section id="projetos" class="section projects">
        <div class="container" id="projectsContainer"></div>
    </section>

    <!-- Education Section -->
    <section id="formacao" class="section education">
        <div class="container" id="educationContainer"></div>
    </section>

    <!-- Contact Section -->
    <section id="contato" class="section contact">
        <div class="container" id="contactContainer"></div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer-text">
                &copy; <span id="current-year">2026</span> <span id="footerName"></span>
                <span id="footerRights"></span>
            </p>
            <p class="footer-built" id="footerBuilt"></p>
        </div>
    </footer>

    <!-- Easter Egg: Terminal Console -->
    <div id="terminal-console">
        <div class="terminal-header">
            <span class="terminal-title">$ mateus@portfolio:~$</span>
            <div class="terminal-controls">
                <button class="terminal-resize" id="terminalResize" aria-label="Resize terminal" title="Resize">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 3 21 3 21 9"/>
                        <polyline points="9 21 3 21 3 15"/>
                        <line x1="21" y1="3" x2="14" y2="10"/>
                        <line x1="3" y1="21" x2="10" y2="14"/>
                    </svg>
                </button>
                <button class="terminal-close" id="terminalClose" aria-label="Close terminal" title="Close">✕</button>
            </div>
        </div>
        <div class="terminal-body">
            <div class="terminal-output" id="terminal-output">
                <div>Welcome to Mateus Portfolio Terminal v1.0.0</div>
                <div>Type 'help' for available commands.</div>
                <div style="margin-top: 0.5rem;"></div>
            </div>
            <div class="terminal-input-line">
                <span class="terminal-prompt">mateus@portfolio:~$</span>
                <input type="text" id="terminal-input" autocomplete="off" spellcheck="false">
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
