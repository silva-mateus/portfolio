name: Deploy Portfolio

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy
      run: |
        # Trabalhar direto no diretório do checkout
        cd $GITHUB_WORKSPACE
        docker compose down
        docker compose up -d --build
        docker image prune -f
        
        # Verificar
        docker ps | grep portfolio
        sleep 3
        curl -I http://localhost:8080