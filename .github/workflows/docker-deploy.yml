name: Deploy Portfolio

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Deploy
      run: |
        # Copiar arquivos do checkout para o diretório de deploy
        rsync -av --delete \
          --exclude '.git' \
          --exclude '_work' \
          --exclude 'node_modules' \
          $GITHUB_WORKSPACE/ ~/portfolio/
        
        # Deploy
        cd ~/portfolio
        docker compose down
        docker compose up -d --build
        docker image prune -f
        
        # Verificar
        docker ps | grep portfolio
        sleep 3
        curl -I http://localhost:8080