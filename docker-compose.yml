version: '3.8'

services:
  portfolio:
    build: .
    container_name: portfolio-app
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - portfolio-network

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - portfolio-network
    depends_on:
      - portfolio

networks:
  portfolio-network:
    driver: bridge